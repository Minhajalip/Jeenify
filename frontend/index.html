<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeenify — Sign In</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <svg width="36" height="36" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="12" fill="url(#lg)"/><path d="M12 22 L22 12 L32 22 L22 32Z" fill="#fff" opacity=".9"/><path d="M22 16 L28 22 L22 28 L16 22Z" fill="url(#lg)" opacity=".7"/><defs><linearGradient id="lg" x1="0" y1="0" x2="44" y2="44"><stop stop-color="#4ade80"/><stop offset="1" stop-color="#16a34a"/></linearGradient></defs></svg>
    <span class="auth-logo-text">Jeenify</span>
  </div>

  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-sub">Don't have an account? <a href="register.html">Register here</a></p>

  <div id="error-box" class="auth-error" hidden></div>

  <form id="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input class="form-input" id="email" type="email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input class="form-input" id="password" type="password" placeholder="••••••••" required />
        <button type="button" class="toggle-password" id="toggle-pw">
          <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="btn-login">Sign in →</button>
  </form>
</div>

<script src="js/api.js"></script>
<script>
// If already logged in, redirect
if (getToken() && getRole()) {
  const routes = { ADMIN: 'admin.html', TEACHER: 'teacher.html', STUDENT: 'student.html' };
  window.location.href = routes[getRole()] || 'index.html';
}

// Password toggle
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  const open = document.getElementById('eye-open');
  const closed = document.getElementById('eye-closed');
  if (pw.type === 'password') {
    pw.type = 'text';
    open.style.display = 'none';
    closed.style.display = 'block';
  } else {
    pw.type = 'password';
    open.style.display = 'block';
    closed.style.display = 'none';
  }
});

// Login
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const errBox = document.getElementById('error-box');
  errBox.hidden = true;

  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const data = await API.post('/api/auth/login', { email, password });
    localStorage.setItem('jfy_token', data.token);
    localStorage.setItem('jfy_role', data.role);
    localStorage.setItem('jfy_name', data.name);
    localStorage.setItem('jfy_userId', String(data.userId));

    // If student, resolve studentId
    if (data.role === 'STUDENT') {
      try {
        const profile = await API.get(`/api/students/me/${data.userId}`);
        if (profile && (profile.studentId || profile.id)) {
          localStorage.setItem('jfy_studentId', String(profile.studentId ?? profile.id));
        }
      } catch(_) {}
    }

    const routes = { ADMIN: 'admin.html', TEACHER: 'teacher.html', STUDENT: 'student.html' };
    window.location.href = routes[data.role] || 'index.html';
  } catch (err) {
    errBox.textContent = err.message || 'Login failed';
    errBox.hidden = false;
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in →';
  }
});
</script>
</body>
</html>
